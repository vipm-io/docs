name: ci
on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
  # allow manual build here:
  # https://github.com/vipm-io/docs/actions/workflows/ci.yml
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label to deploy (e.g., 2026-Q1, preview)'
        required: false
      set_latest:
        description: 'Set this version as "latest"'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff check)
        run: uv run ruff check
      - name: Format check (ruff format --check)
        run: uv run ruff format --check
      - name: Run unit tests
        run: uv run pytest
      - name: Build and validate docs site
        run: uv run python scripts/build_docs.py
      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: site-pr-${{ github.event.pull_request.number || github.run_number }}
          path: site/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install
      - name: Sync dependencies
        run: uv sync
      - name: Configure git for mike
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Generate release-notes table snippet
        run: uv run python scripts/generate_release_notes_table.py
      - name: Generate CLI snippets
        run: uv run python scripts/generate_cli_snippets.py
      - name: Validate prebuild outputs
        run: uv run python scripts/validate_docs_build.py
      - name: Deploy with mike
        run: |
          # Determine version label
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="preview"
          elif [[ "${{ github.ref }}" == refs/heads/release/* ]]; then
            # Extract version from branch name: release/2026-Q3 -> 2026-Q3
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#release/}"
          else
            echo "No deploy rule for ref ${{ github.ref }}"
            exit 0
          fi

          echo "Deploying version: $VERSION"

          # Determine if this version should be aliased as "latest"
          if [ "${{ github.event.inputs.set_latest }}" = "true" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" latest
          elif [ "$VERSION" = "preview" ]; then
            uv run mike deploy --push "$VERSION"
          else
            uv run mike deploy --push "$VERSION"
          fi
      - name: Set default version
        if: github.ref == 'refs/heads/main'
        run: uv run mike set-default --push latest || true
