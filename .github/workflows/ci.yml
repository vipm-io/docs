name: ci
on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
  # allow manual build here:
  # https://github.com/vipm-io/docs/actions/workflows/ci.yml
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label to deploy (e.g., 2026-Q1, preview)'
        required: false
      set_latest:
        description: 'Set this version as "latest"'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install
      - name: Check dependency lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint (ruff check)
        run: uv run ruff check
      - name: Format check (ruff format --check)
        run: uv run ruff format --check
      - name: Type check
        run: uv run pyrefly check .
      - name: Lint GitHub Actions workflows
        run: uv run actionlint
      - name: Audit GitHub Actions workflows
        run: uv run zizmor --offline .github/workflows
      - name: Run unit tests
        run: uv run pytest
      - name: Build and validate docs site
        run: uv run python scripts/build_docs.py
      - name: Upload site artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: site-pr-${{ github.event.pull_request.number || github.run_number }}
          path: site/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install
      - name: Check dependency lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --locked
      - name: Configure git for mike
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Generate release-notes table snippet
        run: uv run python scripts/generate_release_notes_table.py
      - name: Generate CLI snippets
        run: uv run python scripts/generate_cli_snippets.py
      - name: Validate prebuild outputs
        run: uv run python scripts/validate_docs_build.py
      - name: Deploy with mike
        env:
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SET_LATEST: ${{ github.event.inputs.set_latest }}
          VERSION_INPUT: ${{ github.event.inputs.version }}
        run: |
          # Determine version label
          if [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          elif [ "$REF" = "refs/heads/main" ]; then
            VERSION="preview"
          elif [[ "$REF" == refs/heads/release/* ]]; then
            # Extract version from branch name: release/2026-Q3 -> 2026-Q3
            VERSION="$REF_NAME"
            VERSION="${VERSION#release/}"
          else
            echo "No deploy rule for ref $REF"
            exit 0
          fi

          echo "Deploying version: $VERSION"

          # Determine if this version should be aliased as "latest"
          if [ "$SET_LATEST" = "true" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" latest
          elif [ "$VERSION" = "preview" ]; then
            uv run mike deploy --push "$VERSION"
          else
            uv run mike deploy --push "$VERSION"
          fi
      - name: Set default version
        if: github.ref == 'refs/heads/main'
        run: uv run mike set-default --push latest || true
