name: ci
on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
  # allow manual build here:
  # https://github.com/vipm-io/docs/actions/workflows/ci.yml
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label to deploy (e.g., 2026-Q1, preview)'
        required: false
      set_latest:
        description: 'Set this version as "latest"'
        required: false
        default: 'false'
        type: boolean
  workflow_call:
    inputs:
      version:
        description: 'Version label to deploy'
        required: false
        default: ''
        type: string
      set_latest:
        description: 'Set the deployed version as latest'
        required: false
        default: false
        type: boolean
      republish_current_latest:
        description: 'Republish main to the version currently aliased as latest'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Install uv
        # v8.2.0 -> fac544c07dec837d0ccb6301d7b5580bf5edae39
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install
      - name: Check dependency lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --locked
      - name: Lint (ruff check)
        run: uv run ruff check
      - name: Format check (ruff format --check)
        run: uv run ruff format --check
      - name: Type check
        run: uv run pyrefly check .
      - name: Lint GitHub Actions workflows
        run: uv run actionlint
      - name: Audit GitHub Actions workflows
        run: uv run zizmor --offline .github/workflows
      - name: Run unit tests
        run: uv run pytest
      - name: Build and validate docs site
        run: uv run python scripts/build_docs.py
      - name: Upload site artifact
        # v7.0.1 -> 043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: site-pr-${{ github.event.pull_request.number || github.run_number }}
          path: site/
          retention-days: 7

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    # Serialize gh-pages pushes across every invocation path of this workflow
    # (push to main, push to release/*, workflow_dispatch, and workflow_call
    # from republish-latest.yml). Without this, two `mike deploy --push` runs
    # can race and the loser is rejected ("cannot lock ref refs/heads/gh-pages"),
    # leaving one alias (preview or latest) un-updated.
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      # v7.0.0 -> 9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv
        # v8.2.0 -> fac544c07dec837d0ccb6301d7b5580bf5edae39
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          enable-cache: false
      - name: Set up Python
        run: uv python install
      - name: Check dependency lockfile
        run: uv lock --check
      - name: Sync dependencies
        run: uv sync --locked
      - name: Configure git for mike
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
      - name: Generate release-notes table snippet
        run: uv run python scripts/generate_release_notes_table.py
      - name: Generate CLI snippets
        run: uv run python scripts/generate_cli_snippets.py
      - name: Validate prebuild outputs
        run: uv run python scripts/validate_docs_build.py
      - name: Deploy with mike
        env:
          REPUBLISH_CURRENT_LATEST: ${{ inputs.republish_current_latest }}
          REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
          SET_LATEST: ${{ inputs.set_latest }}
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          # Determine version label
          if [ "$REPUBLISH_CURRENT_LATEST" = "true" ]; then
            git fetch origin gh-pages
            VERSION="$(
              git show origin/gh-pages:versions.json |
                jq -er '
                  [.[] | select((.aliases // []) | index("latest")) | .version]
                  | if length == 1 then .[0]
                    else error("expected exactly one version aliased as latest")
                    end
                '
            )"
          elif [ -n "$VERSION_INPUT" ]; then
            VERSION="$VERSION_INPUT"
          elif [ "$REF" = "refs/heads/main" ]; then
            VERSION="preview"
          elif [[ "$REF" == refs/heads/release/* ]]; then
            # Extract version from branch name: release/2026-Q3 -> 2026-Q3
            VERSION="$REF_NAME"
            VERSION="${VERSION#release/}"
          else
            echo "No deploy rule for ref $REF"
            exit 0
          fi

          echo "Deploying version: $VERSION"

          # Determine if this version should be aliased as "latest"
          if [ "$REPUBLISH_CURRENT_LATEST" = "true" ] || [ "$SET_LATEST" = "true" ]; then
            uv run mike deploy --push --update-aliases "$VERSION" latest
          elif [ "$VERSION" = "preview" ]; then
            uv run mike deploy --push "$VERSION"
          else
            uv run mike deploy --push "$VERSION"
          fi
      - name: Set default version
        if: github.ref == 'refs/heads/main'
        run: uv run mike set-default --push latest || true
