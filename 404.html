<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found — Redirecting</title>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/latest/" />
  </noscript>
  <script>
    // Redirect 404s to the correct versioned path.
    // - Unversioned paths (e.g. /cli/) redirect to /latest/cli/
    // - Already-versioned paths (e.g. /latest/cli2) redirect to that version's root
    // Fetches versions.json so this file never needs manual updates.
    (function() {
      var path = window.location.pathname;
      var firstSegment = path.split("/").filter(Boolean)[0] || "";

      fetch("/versions.json")
        .then(function(r) { return r.json(); })
        .then(function(versions) {
          var prefixes = ["latest"];
          versions.forEach(function(v) {
            prefixes.push(v.version);
            (v.aliases || []).forEach(function(a) { prefixes.push(a); });
          });
          if (prefixes.indexOf(firstSegment) === -1) {
            // Unversioned path — try /latest/ + path
            window.location.replace("/latest" + path + window.location.search + window.location.hash);
          } else {
            // Already versioned but page not found — go to that version's root
            window.location.replace("/" + firstSegment + "/");
          }
        })
        .catch(function() {
          window.location.replace("/latest/");
        });
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="/latest/">latest documentation</a>...</p>
</body>
</html>
