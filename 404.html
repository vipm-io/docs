<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found — Redirecting</title>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/latest/" />
  </noscript>
  <script>
    // Redirect unversioned paths to /latest/ equivalent.
    // Fetches versions.json to determine known version prefixes,
    // so this file never needs manual updates when versions change.
    (function() {
      var path = window.location.pathname;
      var firstSegment = path.split("/").filter(Boolean)[0] || "";

      fetch("/versions.json")
        .then(function(r) { return r.json(); })
        .then(function(versions) {
          var prefixes = ["latest"];
          versions.forEach(function(v) {
            prefixes.push(v.version);
            (v.aliases || []).forEach(function(a) { prefixes.push(a); });
          });
          if (prefixes.indexOf(firstSegment) === -1) {
            window.location.replace("/latest" + path + window.location.search + window.location.hash);
          }
        })
        .catch(function() {
          // If versions.json can't be loaded, redirect to /latest/ root
          window.location.replace("/latest/");
        });
    })();
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>Redirecting... or go to the <a href="/latest/">latest documentation</a>.</p>
</body>
</html>
