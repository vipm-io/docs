<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Page Not Found — Redirecting</title>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/latest/" />
  </noscript>
  <script>
    // Redirect unversioned paths to /latest/ equivalent.
    // Only redirect once — if the path already starts with a known
    // version prefix, show the 404 instead of looping.
    var path = window.location.pathname;
    var firstSegment = path.split("/").filter(Boolean)[0] || "";
    var versionPrefixes = ["latest", "dev", "2026-Q1", "2026-Q3"];

    if (versionPrefixes.indexOf(firstSegment) === -1) {
      window.location.replace("/latest" + path + window.location.search + window.location.hash);
    }
  </script>
</head>
<body>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist. Go to the <a href="/latest/">latest documentation</a>.</p>
</body>
</html>
